
<style>
  .grid { display: flex; gap: 20px; flex-wrap: wrap; padding: 20px 0; justify-content: center; }
  .card { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 20px 16px; border: 1px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); min-width: 110px; }
  .label { font-size: 12px; color: var(--color-text-secondary); font-family: var(--font-mono); }
  .copy-btn { font-size: 11px; padding: 4px 10px; border: 1px solid var(--color-border-secondary); border-radius: 6px; background: var(--color-background-secondary); color: var(--color-text-secondary); cursor: pointer; }
  .copy-btn:hover { background: var(--color-background-tertiary); }
  .copy-btn.copied { color: var(--color-text-success); border-color: var(--color-border-success); }
  pre { display: none; }
</style>

<div class="grid" id="icons"></div>
<pre id="svg-check"><svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40"><circle cx="20" cy="20" r="19" fill="#22c55e"/><polyline points="11,20 17,27 30,13" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></pre>
<pre id="svg-x"><svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40"><circle cx="20" cy="20" r="19" fill="#ef4444"/><line x1="13" y1="13" x2="27" y2="27" stroke="#fff" stroke-width="3" stroke-linecap="round"/><line x1="27" y1="13" x2="13" y2="27" stroke="#fff" stroke-width="3" stroke-linecap="round"/></svg></pre>
<pre id="svg-warn"><svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40"><circle cx="20" cy="20" r="19" fill="#f59e0b"/><line x1="20" y1="12" x2="20" y2="24" stroke="#fff" stroke-width="3" stroke-linecap="round"/><circle cx="20" cy="29" r="1.8" fill="#fff"/></svg></pre>
<pre id="svg-info"><svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40"><circle cx="20" cy="20" r="19" fill="#3b82f6"/><circle cx="20" cy="13" r="1.8" fill="#fff"/><line x1="20" y1="19" x2="20" y2="28" stroke="#fff" stroke-width="3" stroke-linecap="round"/></svg></pre>
<pre id="svg-q"><svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40"><circle cx="20" cy="20" r="19" fill="#8b5cf6"/><text x="20" y="27" text-anchor="middle" font-size="22" font-weight="700" font-family="sans-serif" fill="#fff">?</text></svg></pre>

<script>
const icons = [
  { id: "svg-check", label: "✔ success",  name: "check" },
  { id: "svg-x",     label: "✖ error",    name: "x" },
  { id: "svg-warn",  label: "⚠ warning",  name: "warn" },
  { id: "svg-info",  label: "ℹ info",     name: "info" },
  { id: "svg-q",     label: "? question", name: "question" },
];

const container = document.getElementById("icons");

icons.forEach(({ id, label, name }) => {
  const svgRaw = document.getElementById(id).textContent.trim();
  const parser = new DOMParser();
  const doc = parser.parseFromString(svgRaw, "image/svg+xml");
  const svgEl = doc.documentElement;
  svgEl.setAttribute("width", "56");
  svgEl.setAttribute("height", "56");

  const card = document.createElement("div");
  card.className = "card";

  const preview = document.createElement("div");
  preview.innerHTML = svgEl.outerHTML;

  const lbl = document.createElement("div");
  lbl.className = "label";
  lbl.textContent = label;

  const btn = document.createElement("button");
  btn.className = "copy-btn";
  btn.textContent = "Copy SVG";
  btn.onclick = () => {
    navigator.clipboard.writeText(svgRaw).then(() => {
      btn.textContent = "Copied!";
      btn.classList.add("copied");
      setTimeout(() => { btn.textContent = "Copy SVG"; btn.classList.remove("copied"); }, 1500);
    });
  };

  card.appendChild(preview);
  card.appendChild(lbl);
  card.appendChild(btn);
  container.appendChild(card);
});
</script>
